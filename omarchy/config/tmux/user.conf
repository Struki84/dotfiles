# ~/.config/tmux/user.conf — personal layout, keybinds, plugins.
# Sourced LAST from Omarchy's tmux.conf so these win. 

set -g default-shell /usr/bin/zsh

# --- Terminal extras (undercurl; Omarchy already sets RGB truecolor) ---
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -ga terminal-features 'alacritty:clipboard'

# --- Catppuccin Mocha palette ---
#   base #1e1e2e | mantle #181825 | blue #89b4fa | surface0 #313244
set -g status-style                 "bg=#181825,fg=#89b4fa"
set -g message-style                "bg=#89b4fa,fg=#1e1e2e"
set -g pane-border-style            "fg=#313244"
set -g pane-active-border-style     "fg=#313244"
setw -g window-status-current-style "bg=#89b4fa,fg=#1e1e2e"
setw -g window-status-style         "bg=#181825,fg=#89b4fa"

# --- Status line: my layout, Catppuccin colors ---
# set -g status-position top   # uncomment for top bar (like the Mac config)
set -g status-justify right
set -g status-left-length 200
set -g status-right-length 100
set -g status-left  '#{?client_prefix,#[reverse],}#[fg=#89b4fa,bg=#181825] #T #[default]'
set -g status-right '#[fg=#89b4fa,bg=#181825] #S #I:#P #{?window_zoomed_flag,🔍,} '
setw -g window-status-format         ' #I:#F#W '
setw -g window-status-current-format ' #I:#F#W '

# --- Prefix (C-Space matches Omarchy; drop its C-b secondary) ---
unbind C-b
set -g prefix C-Space
set -g prefix2 None
bind C-Space send-prefix

# --- Splits, open in current dir ---
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- Pane nav: Alt+arrows ---
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# --- Window nav ---
bind k next-window
bind j previous-window

# --- Plugins (TPM) ---
set -g @continuum-restore 'on'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Keep at the very bottom
run '~/.config/tmux/plugins/tpm/tpm'
