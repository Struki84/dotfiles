env = OMARCHY_SCREENSHOT_DIR,$HOME/Pictures/Screenshots
env = OMARCHY_SCREENRECORD_DIR,$HOME/Videos/ScreenRecordings

#### NAVIGATION 
$CMD = Alt

# Workspace navigation
bind = SHIFT CTRL, 1, exec, ~/.dotfiles/omarchy/bin/move-to-workspace 1
bind = SHIFT CTRL, 2, exec, ~/.dotfiles/omarchy/bin/move-to-workspace 2
bind = SHIFT CTRL, 3, exec, ~/.dotfiles/omarchy/bin/move-to-workspace 3

bind = $CMD, 1, exec, ~/.dotfiles/omarchy/bin/focus-or-start "Brave-browser" "brave"
bind = $CMD, 2, exec, ~/.dotfiles/omarchy/bin/focus-or-start "Alacritty" "alacritty"
bind = $CMD, 3, exec, ~/.dotfiles/omarchy/bin/focus-or-start "Ferdium" "ferdium"
bind = $CMD, 4, exec, ~/.dotfiles/omarchy/bin/focus-or-start "Notion" "notion-app"

# Swap active window with the one next to it with SUPER + SHIFT + arrow keys
bindd = SUPER SHIFT, left, Swap window to the left, swapwindow, l
bindd = SUPER SHIFT, right, Swap window to the right, swapwindow, h

# Cycle through applications on active workspace
bindd = $CMD,       Tab, Cycle to next window, cyclenext
bindd = $CMD SHIFT, Tab, Cycle to prev window, cyclenext, prev

# Move focus with mainMod + arrow keys
bind = SUPER, left,  movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up,    movefocus, u
bind = SUPER, down,  movefocus, d

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

# Menu controls
# bind = SUPER,      Space, exec, $mainMenu
# bind = $CMD SHIFT, Space,  exec, $mainMenu Bookmarks
# bind = $CMD,       Space, exec, $launcher
# bind = $CMD SHIFT, W,     exec, $wallpaperMenu

# Shortcuts
bind = $CMD,  Q,      killactive,
bind = $CMD,  F,      togglefloating,

#### MEDIA

# toggle radiotray-ng stream
bindl = SHIFT, XF86AudioPause, exec, dbus-send --session --type=method_call --dest=com.github.radiotray_ng /com/github/radiotray_ng com.github.radiotray_ng.stop
bindl = SHIFT, XF86AudioPlay, exec, dbus-send --session --type=method_call --dest=com.github.radiotray_ng /com/github/radiotray_ng com.github.radiotray_ng.play

exec-once = radiotray-ng
exec-once = ~/.dotfiles/omarchy/bin/watch-torrent

#### LOOK AND FEEL

general { 
    gaps_in = 2
    gaps_out = 10
    border_size = 1
    resize_on_border = true
}

decoration {
    rounding = 8
    active_opacity = 0.9
    inactive_opacity = 0.7
    fullscreen_opacity = 1
    
    blur {
        enabled = true
        size = 2
        passes = 5
        new_optimizations = true
        ignore_opacity = true
        xray = false
        popups = true
        vibrancy=0.1696
    }
    
    # shadow {
    #     enabled = true
    #     range = 15
    #     render_power = 5
    #     color = rgba(0,0,0,.5)
    # }
}

